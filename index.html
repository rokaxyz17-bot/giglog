<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiGLog — ライブスケジュール管理</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f4f6fb;
  --bg2: #eef1f8;
  --surface: #ffffff;
  --surface2: #f8f9fd;
  --surface3: #edf0f8;
  --border: #dde2ef;
  --border2: #c8d0e8;
  --accent: #1a5cff;
  --accent2: #4d82ff;
  --accent-dim: rgba(26,92,255,0.09);
  --accent-dark: #0a3dbf;
  --ink: #0f1523;
  --text: #1a2035;
  --text-muted: #6b7694;
  --text-dim: #a8b0c8;
  --green: #12c47a;
  --green-dim: rgba(18,196,122,0.1);
  --red: #f02b5a;
  --red-dim: rgba(240,43,90,0.1);
  --sans: 'Noto Sans JP', sans-serif;
  --mono: 'Space Mono', monospace;
  --cond: 'Big Shoulders Display', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── GRAIN OVERLAY ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ── SETUP SCREEN ── */
#setupScreen {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: var(--bg);
  position: relative;
}

/* diagonal accent strip */
#setupScreen::before {
  content: '';
  position: fixed;
  top: -80px; right: -80px;
  width: 400px; height: 400px;
  background: var(--accent);
  opacity: 0.05;
  border-radius: 50%;
  pointer-events: none;
}

.setup-wrap {
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 1;
}

/* ── SPRAY-ART SVG LOGO ── */
.setup-logo {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo-svg-wrap {
  display: block;
  width: 100%;
  max-width: 410px;
  position: relative;
}

.logo-sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-top: 6px;
  opacity: 0.8;
}

/* ── AUTH CARD ── */
.setup-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 32px rgba(26,92,255,0.06), 0 1px 4px rgba(0,0,0,0.04);
}

.setup-tabs {
  display: flex;
  border-bottom: 1.5px solid var(--border);
  background: var(--surface2);
}

.setup-tab {
  flex: 1;
  padding: 14px;
  background: none;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.02em;
}

.setup-tab.active {
  color: var(--accent);
  background: var(--surface);
  box-shadow: inset 0 -2px 0 var(--accent);
}

.setup-tab:hover:not(.active) {
  color: var(--text);
  background: var(--surface3);
}

.setup-body {
  padding: 28px 28px 24px;
}

.setup-note {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 20px;
  padding: 12px 14px;
  background: var(--accent-dim);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
}

.setup-note a {
  color: var(--accent);
  text-decoration: none;
}

.field {
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 7px;
}

.field input, .field select, .field textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}

.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
  background: var(--surface);
}

.err-msg {
  font-size: 12px;
  color: var(--red);
  margin: 8px 0 4px;
  min-height: 16px;
  line-height: 1.5;
}

.btn-primary {
  width: 100%;
  padding: 12px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.16s;
  margin-top: 4px;
  letter-spacing: 0.02em;
}

.btn-primary:hover {
  background: var(--accent-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(26,92,255,0.28);
}

.btn-primary:active {
  transform: translateY(0);
}

/* ── APP SCREEN HEADER ── */
.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 24px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(26,92,255,0.05);
}

.app-logo {
  display: flex;
  align-items: center;
}

.header-center { flex: 1; }

.user-email {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn-settings {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-settings:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-logout {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-logout:hover {
  border-color: var(--red);
  color: var(--red);
}

/* ── SETTINGS PANEL ── */
.settings-panel {
  display: none;
  position: absolute;
  top: 56px; right: 16px;
  width: 300px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

.settings-panel.open { display: block; }

.settings-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* ── APP BODY ── */
.app-body {
  flex: 1;
  padding: 24px;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}

.view-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}

.view-tabs {
  display: flex;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}

.view-tab {
  padding: 7px 18px;
  background: none;
  border: none;
  border-radius: 7px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.view-tab.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(26,92,255,0.25);
}

.view-tab:hover:not(.active) {
  background: var(--surface3);
  color: var(--text);
}

.btn-add {
  padding: 9px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.16s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.btn-add:hover {
  background: var(--accent-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(26,92,255,0.28);
}

/* ── CONCERT LIST ── */
.concert-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.concert-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.concert-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.15s;
}

.concert-card:hover {
  border-color: var(--accent2);
  box-shadow: 0 4px 20px rgba(26,92,255,0.08);
  transform: translateY(-1px);
}

.concert-card:hover::before {
  opacity: 1;
}

.concert-date-block {
  min-width: 52px;
  text-align: center;
  background: var(--accent-dim);
  border-radius: 10px;
  padding: 8px 6px;
  flex-shrink: 0;
}

.concert-date-month {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.concert-date-day {
  font-family: var(--cond);
  font-size: 26px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  margin-top: 1px;
}

.concert-date-weekday {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 2px;
}

.concert-info {
  flex: 1;
  min-width: 0;
}

.concert-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.concert-artist {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 6px;
}

.concert-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.concert-meta-item {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 3px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 64px 20px;
  color: var(--text-dim);
}

.empty-icon {
  font-size: 48px;
  display: block;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state p {
  font-size: 14px;
  color: var(--text-muted);
}

/* ── CALENDAR ── */

.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.calendar-title {
  font-family: var(--cond);
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 0.02em;
}

.btn-cal-nav {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 16px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-cal-nav:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.calendar-grid {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.calendar-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--surface2);
  border-bottom: 1.5px solid var(--border);
}

.cal-weekday {
  text-align: center;
  padding: 10px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.calendar-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

.cal-day {
  min-height: 72px;
  padding: 8px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}

.cal-day:nth-child(7n) { border-right: none; }

.cal-day.other-month .cal-day-num { color: var(--text-dim); }

.cal-day.today .cal-day-num {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 24px; height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

.cal-day-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-weight: 700;
}

.cal-event {
  font-size: 10px;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 4px;
  padding: 2px 5px;
  margin-bottom: 2px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  display: block;
}

.cal-event:hover { background: rgba(26,92,255,0.18); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,15,35,0.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(10,15,35,0.18);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 24px 16px;
  border-bottom: 1.5px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
}

.modal-title {
  font-family: var(--cond);
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.btn-close {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
}

.btn-close:hover {
  border-color: var(--red);
  color: var(--red);
}

.modal-body { padding: 24px; }

/* ── ADD MODAL TABS ── */
.add-method-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}

.add-method-btn {
  flex: 1;
  padding: 12px 8px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}

.add-method-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.add-method-btn:hover:not(.active) {
  border-color: var(--border2);
  color: var(--text);
}

.add-pane { display: none; }
.add-pane.active { display: block; }

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── AI LOADING ── */
.ai-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 32px;
  color: var(--text-muted);
  font-size: 13px;
}

.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── MODAL ACTIONS ── */
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  padding-top: 8px;
  margin-top: 8px;
  border-top: 1.5px solid var(--border);
}

.btn-secondary {
  padding: 10px 16px;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  white-space: nowrap;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-secondary:hover {
  border-color: var(--border2);
  color: var(--text);
}

.btn-danger {
  padding: 10px 20px;
  background: none;
  border: 1.5px solid var(--red);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--red);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-danger:hover {
  background: var(--red-dim);
}

/* ── DETAIL MODAL ── */
.detail-hero {
  background: linear-gradient(135deg, var(--accent-dim) 0%, var(--surface2) 100%);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1.5px solid var(--border);
}

.detail-title {
  font-family: var(--cond);
  font-size: 26px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}

.detail-artist {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
}

.detail-times {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.detail-time-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.detail-time-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
}

.detail-time-val {
  font-family: var(--cond);
  font-size: 18px;
  font-weight: 900;
  color: var(--text);
}

.detail-section {
  margin-bottom: 16px;
}

.detail-section-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.detail-section-val {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
}

.tag {
  display: inline-block;
  padding: 3px 9px;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  margin-right: 4px;
  margin-bottom: 4px;
}

.detail-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
}

.detail-link:hover { text-decoration: underline; }

.detail-memo {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  padding: 12px 20px;
  background: var(--ink);
  color: #fff;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9000;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.25s;
  max-width: 320px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.ok { background: var(--green); }
.toast.err { background: var(--red); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .app-body { padding: 16px; }
  .user-email { display: none; }
  .field-row { grid-template-columns: 1fr; }
  .add-method-tabs { flex-wrap: wrap; }
  .detail-times { gap: 10px; }
  .calendar-grid { font-size: 10px; }
  .cal-day { min-height: 56px; padding: 5px; }
  .modal { border-radius: 16px; }
  .settings-panel { width: 90vw; }
}

/* ── MODAL CLOSE BTN ── */
.modal-close {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }

/* ── ADD MODAL STEPS ── */
.add-steps {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.add-step-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 8px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.add-step-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.add-step-btn:hover:not(.active) {
  border-color: var(--border2);
  color: var(--text);
}

/* ── INPUT ZONES ── */
.input-zone { display: none; margin-bottom: 16px; }
.input-zone.visible { display: block; }

.url-row {
  display: flex;
  gap: 8px;
}
.url-row input {
  flex: 1;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.url-row input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.btn-fetch {
  padding: 10px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-fetch:hover { background: var(--accent-dark); }

/* ── DROP ZONE ── */
.drop-zone {
  border: 2px dashed var(--border2);
  border-radius: 12px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.drop-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
.drop-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}
.drop-icon { font-size: 32px; display: block; margin-bottom: 8px; }
.drop-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

/* ── STATUS BAR ── */
.status-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--accent-dim);
  border-radius: 10px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--accent);
}
.status-bar.visible { display: flex; }

/* ── FORM SECTION ── */
.form-section {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ── GRID ── */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.col-full { grid-column: 1 / -1; }

/* ── TRANSPORT CHECKBOXES ── */
.check-group { display: flex; flex-wrap: wrap; gap: 8px; }
.check-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.12s;
}
.check-item:hover { border-color: var(--accent); }
.check-item input { accent-color: var(--accent); }


/* ── CALENDAR LAYOUT ── */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.cal-month-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  letter-spacing: 0.05em;
  color: var(--text);
}
.cal-nav {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 34px; height: 34px;
  font-size: 20px;
  line-height: 1;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.cal-nav:hover { border-color: var(--accent); color: var(--accent); }

.cal-grid {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.cal-weekday {
  text-align: center;
  padding: 10px 4px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: var(--surface2);
  border-bottom: 1.5px solid var(--border);
}
.cal-cell {
  height: 80px;
  overflow: hidden;
  padding: 4px 6px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.other-month { background: var(--surface2); }
.cal-cell.other-month .cal-day-num { color: var(--text-dim); }
.cal-cell.today .cal-day-num {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 22px; height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}
.cal-day-num {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-weight: 700;
  display: block;
}


/* カレンダーは常に表示（enterAppでblock設定） */
#calendarView { display: block !important; }

.cal-month-center {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.cal-month-picker {
  display: flex;
  align-items: center;
  gap: 4px;
}
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

/* ── CUSTOM TOOLTIP ── */
.cal-event {
  position: relative;
}
.cal-event::after {
  content: attr(data-title);
  position: absolute;
  bottom: calc(100% + 4px);
  left: 0;
  background: rgba(20,20,30,0.92);
  color: #fff;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  padding: 4px 8px;
  border-radius: 6px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
  max-width: 200px;
  white-space: normal;
  word-break: break-all;
}
.cal-event:hover::after {
  opacity: 1;
}

.cal-nav-left {
  display: flex;
  align-items: center;
  gap: 2px;
}
.cal-nav-picker {
  color: var(--accent);
  padding: 4px 6px;
  opacity: 0.7;
}
.cal-nav-picker:hover { opacity: 1; }

/* ── EVENT TYPE COLORS ── */
:root {
  --et-wanman:   #1a5cff;
  --et-fes:      #f59e0b;
  --et-release:  #10b981;
  --et-taiband:  #8b5cf6;
  --et-other:    #6b7280;
}
.cal-event[data-type="ワンマン"]      { background: #dbeafe; color: var(--et-wanman);  border-left: 2px solid var(--et-wanman); }
.cal-event[data-type="フェス"]        { background: #fef3c7; color: var(--et-fes);     border-left: 2px solid var(--et-fes); }
.cal-event[data-type="リリースイベント"] { background: #d1fae5; color: var(--et-release); border-left: 2px solid var(--et-release); }
.cal-event[data-type="対バンライブ"]  { background: #ede9fe; color: var(--et-taiband); border-left: 2px solid var(--et-taiband); }
.cal-event[data-type="その他"]        { background: #f3f4f6; color: var(--et-other);   border-left: 2px solid var(--et-other); }

/* ── EVENT TYPE RADIO ── */
.event-type-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.et-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--sans);
  transition: all 0.15s;
  user-select: none;
}
.et-chip input[type="radio"] { display: none; }
.et-chip.selected { border-width: 2px; }
.et-chip[data-type="ワンマン"].selected      { background: #dbeafe; color: var(--et-wanman);  border-color: var(--et-wanman); }
.et-chip[data-type="フェス"].selected        { background: #fef3c7; color: var(--et-fes);     border-color: var(--et-fes); }
.et-chip[data-type="リリースイベント"].selected { background: #d1fae5; color: var(--et-release); border-color: var(--et-release); }
.et-chip[data-type="対バンライブ"].selected  { background: #ede9fe; color: var(--et-taiband); border-color: var(--et-taiband); }
.et-chip[data-type="その他"].selected        { background: #f3f4f6; color: var(--et-other);   border-color: var(--et-other); }

/* ── DETAIL MODAL REDESIGN ── */
.detail-section { padding: 20px 24px 0; }
.detail-title-block { margin-bottom: 16px; }
.detail-type-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 6px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.detail-type-badge[data-type="ワンマン"]      { background: #dbeafe; color: var(--et-wanman); }
.detail-type-badge[data-type="フェス"]        { background: #fef3c7; color: var(--et-fes); }
.detail-type-badge[data-type="リリースイベント"] { background: #d1fae5; color: var(--et-release); }
.detail-type-badge[data-type="対バンライブ"]  { background: #ede9fe; color: var(--et-taiband); }
.detail-type-badge[data-type="その他"]        { background: #f3f4f6; color: var(--et-other); }
.detail-h1 { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.3; }
.detail-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.detail-times {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.dtime {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  min-width: 60px;
}
.dtime-label { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
.dtime-val { font-size: 16px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--text); }
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-top: 8px;
}
.detail-item {
  background: var(--surface);
  padding: 10px 14px;
}
.detail-item label { font-size: 10px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.detail-item .val { font-size: 13px; color: var(--text); font-weight: 500; }
.detail-item .val a { color: var(--accent); text-decoration: none; }

/* ── MONTH PICKER POPUP ── */
.month-picker-popup {
  position: absolute;
  top: 48px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  z-index: 200;
  min-width: 260px;
}
.month-picker-popup h4 {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 10px; text-align: center;
}
.month-picker-popup select {
  font-size: 14px; padding: 6px 10px;
  border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text); width: 100%;
  margin-bottom: 8px;
}
.month-picker-popup .btn-go {
  width: 100%; padding: 8px; background: var(--accent);
  color: #fff; border: none; border-radius: 8px;
  font-weight: 700; cursor: pointer; font-size: 13px;
}
.cal-header { position: relative; }
</style>

    <div class="setup-card">
      <div class="setup-tabs">
        <button class="setup-tab active" onclick="switchAuthTab('login')">ログイン</button>
        <button class="setup-tab" onclick="switchAuthTab('signup')">新規登録</button>
      </div>

      <!-- Login -->
      <div class="setup-body" id="loginPane">
        <div class="field">
          <label>メールアドレス</label>
          <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>パスワード</label>
          <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="err-msg" id="loginErr"></div>
        <button class="btn-primary" onclick="doLogin()">ログイン</button>
      </div>

      <!-- Signup -->
      <div class="setup-body" id="signupPane" style="display:none">
        <div class="field">
          <label>アカウント名</label>
          <input type="text" id="signupName" placeholder="例: kizuku">
        </div>
        <div class="field">
          <label>メールアドレス</label>
          <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>パスワード（6文字以上）</label>
          <input type="password" id="signupPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignup()">
        </div>
        <div class="err-msg" id="signupErr"></div>
        <button class="btn-primary" onclick="doSignup()">アカウント作成</button>
      </div>

      <!-- Config -->
    </div>

    <div class="user-email" id="userEmailLabel"></div>
    <button class="btn-settings" onclick="toggleSettings()" title="設定">⚙</button>
    <button class="btn-logout" onclick="doLogout()">ログアウト</button>
  </header>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">⚙ 情報</div>
    <div style="font-size:12px;color:var(--text-muted);line-height:1.6">
      AI読み取りはCloudflare経由で動作しています。<br>
      問題がある場合は管理者に連絡してください。
    </div>
  </div>

  <div class="app-body">
    <div class="view-bar">
      <div class="view-tabs">
        <button class="view-tab" onclick="switchView('list')">リスト</button>
        <button class="view-tab active" onclick="switchView('calendar')">カレンダー</button>
      </div>
      <button class="btn-add" onclick="openAddModal()">＋ 遠征を追加</button>
    </div>

    <!-- List view -->
    <div id="listView" style="display:none">
      <div class="concert-list" id="concertList">
        <div class="empty-state">
          <span class="empty-icon">🎤</span>
          <p>まだ遠征が登録されていません<br>「遠征を追加」から登録しましょう</p>
        </div>
      </div>
    </div>

    <!-- Calendar view -->
    <div id="calendarView">
      <div class="cal-header">
        <div class="cal-nav-left">
          <button class="cal-nav" onclick="calMove(-1)">‹</button>
          <button class="cal-nav cal-nav-picker" onclick="toggleMonthPicker()" title="月を選択">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <path d="M5 1v4M11 1v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M1 7h14" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="5.5" cy="10.5" r="1" fill="currentColor"/>
              <circle cx="8" cy="10.5" r="1" fill="currentColor"/>
              <circle cx="10.5" cy="10.5" r="1" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <div class="cal-month-center">
          <div class="cal-month-label" id="calMonthLabel"></div>
          <div class="cal-month-picker" id="calMonthPicker" style="display:none">
            <select id="calPickYear" onchange="jumpToMonth()" style="font-size:14px;padding:4px 6px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);margin-right:4px"></select>
            <select id="calPickMonth" onchange="jumpToMonth()" style="font-size:14px;padding:4px 6px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text)">
              <option value="0">1月</option><option value="1">2月</option><option value="2">3月</option>
              <option value="3">4月</option><option value="4">5月</option><option value="5">6月</option>
              <option value="6">7月</option><option value="7">8月</option><option value="8">9月</option>
              <option value="9">10月</option><option value="10">11月</option><option value="11">12月</option>
            </select>
          </div>
        </div>
        <button class="cal-nav" onclick="calMove(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>
</div>

<!-- ── ADD/EDIT MODAL ── -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">遠征を追加</div>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="modal-body">

      <!-- Input method selector -->
      <div class="add-steps">
        <button class="add-step-btn active" id="stepUrl" onclick="setInputMode('url')">
          🔗<span>URL</span>
        </button>
        <button class="add-step-btn" id="stepImg" onclick="setInputMode('img')">
          📸<span>スクショ</span>
        </button>
        <button class="add-step-btn" id="stepManual" onclick="setInputMode('manual')">
          ✏️<span>手動</span>
        </button>
      </div>

      <!-- URL input -->
      <div class="input-zone visible" id="zoneUrl">
        <div class="url-row">
          <input type="url" id="concertUrl" placeholder="チケット・公演ページのURL…">
          <button class="btn-fetch" id="fetchUrlBtn" onclick="fetchFromUrl()">AI読み取り</button>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--text-dim)">
          イープラス・ぴあ・ローチケ・アーティスト公式HPなど
        </div>
      </div>

      <!-- Image upload -->
      <div class="input-zone" id="zoneImg">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="imgFile" accept="image/*" onchange="handleImg(this.files[0])">
          <span class="drop-icon">📸</span>
          <div class="drop-text">チケット・公演スクショをドロップ<br>または タップして選択</div>
        </div>
      </div>

      <div class="input-zone" id="zoneManual">
        <div style="font-size:12px;color:var(--text-muted);padding:8px 0">以下のフォームに直接入力してください</div>
      </div>

      <!-- Status bar -->
      <div class="status-bar" id="statusBar">
        <div class="spinner" id="spinner"></div>
        <span id="statusText">AIが解析中...</span>
      </div>

      <!-- Form -->
      <div class="form-section">基本情報</div>
      <div class="grid-2">
        <div class="field col-full">
          <label>イベント形態 <span style="color:var(--accent)">*</span></label>
          <div class="event-type-group" id="eventTypeGroup">
            <label class="et-chip" data-type="ワンマン" onclick="selectEventType(this)"><input type="radio" name="eventType" value="ワンマン">ワンマン</label>
            <label class="et-chip" data-type="フェス" onclick="selectEventType(this)"><input type="radio" name="eventType" value="フェス">フェス</label>
            <label class="et-chip" data-type="リリースイベント" onclick="selectEventType(this)"><input type="radio" name="eventType" value="リリースイベント">リリースイベント</label>
            <label class="et-chip" data-type="対バンライブ" onclick="selectEventType(this)"><input type="radio" name="eventType" value="対バンライブ">対バンライブ</label>
            <label class="et-chip" data-type="その他" onclick="selectEventType(this)"><input type="radio" name="eventType" value="その他">その他</label>
          </div>
        </div>
        <div class="field col-full">
          <label>タイトル *</label>
          <input type="text" id="fTitle" placeholder="例：ExWHYZ 3rd Anniversary Live">
        </div>
        <div class="field col-full">
          <label>表示名 <span style="font-size:10px;color:var(--text-muted);font-weight:400">（任意・カレンダー略称）</span></label>

function calMove(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const gridEl = document.getElementById('calGrid');
  const labelEl = document.getElementById('calMonthLabel');
  if (!gridEl || !labelEl) return;

  labelEl.textContent = calYear + '年 ' + MONTHS_JP[calMonth];

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();
  const todayY = today.getFullYear();
  const todayM = today.getMonth();
  const todayD = today.getDate();

  let out = WEEKDAYS.map(d => '<div class="cal-weekday">' + d + '</div>').join('');

  for (let i = 0; i < firstDay; i++) {
    out += '<div class="cal-cell other-month"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = (todayY === calYear && todayM === calMonth && todayD === d);
    const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dayConcerts = concerts.filter(c => c.concert_date === dateStr);

    let eventsHtml = '';
    dayConcerts.forEach(function(c) {
      // 略称: 任意設定 > タイトル短い場合そのまま > アーティスト@都市
      let calLabel;
      if (c.cal_label) {
        calLabel = esc(c.cal_label);
      } else {
        const t = c.title || '';
        const a = c.artist || '';
        const city = c.city || '';
        // タイトルが短い（12文字以内）→ タイトルをそのまま使う
        if (t.length <= 12) {
          calLabel = esc(t);
        } else if (a && city) {
          // タイトルが長い → アーティスト@都市
          calLabel = esc(a) + '@' + esc(city);
        } else if (a) {
          calLabel = esc(a);
        } else {
          calLabel = esc(t.slice(0,11) + '…');
        }
      }
      eventsHtml += '<div class="cal-event" onclick="event.stopPropagation();openDetail(\'' + c.id + '\')" data-title="' + esc(c.title) + '" data-type="' + esc(c.event_type||'') + '">' + calLabel + '</div>';
    });

    const clickAttr = dayConcerts.length > 0 ? ' onclick="openDetail(\'' + dayConcerts[0].id + '\')" style="cursor:pointer"' : '';
    out += '<div class="cal-cell' + (isToday ? ' today' : '') + '"' + clickAttr + '>';
    out += '<span class="cal-day-num">' + d + '</span>';
    out += eventsHtml;
    out += '</div>';
  }

  const total = firstDay + daysInMonth;
  const remainder = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 0; i < remainder; i++) out += '<div class="cal-cell other-month"></div>';

  gridEl.innerHTML = out;
}

function setStatus(loading, msg, errMsg) {

  if (!bar) return;
  if (loading) {
    bar.classList.add('visible');
    if (sp) sp.style.display = '';
    if (txt) txt.textContent = msg || '処理中...';
  } else if (errMsg) {
    bar.classList.add('visible');
    if (sp) sp.style.display = 'none';
    if (txt) { txt.textContent = '⚠ ' + errMsg; txt.className = 'status-err'; }
  } else {
    bar.classList.remove('visible');
  }
}

    merch_time: document.getElementById('fMerchTime').value || null,
    tokuten_time: document.getElementById('fTokutenTime').value || null,
    cd_sale_time: document.getElementById('fCdSaleTime')?.value || null,
    event_type: eventType,
    cal_label: document.getElementById('fCalLabel')?.value || null,
    venue: document.getElementById('fVenue').value || null,
    city: document.getElementById('fCity').value || null,
    transport: transport.length ? transport : null,
    stay: document.getElementById('fStay').value || null,
    companion: document.getElementById('fCompanion').value || null,
    ticket_url: document.getElementById('fTicketUrl').value || null,
    concert_url: document.getElementById('fConcertUrl').value || null,
    memo: document.getElementById('fMemo').value || null,
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  let error;
  if (editingId) {
    const res = await supaClient.from('concerts').update(payload).eq('id', editingId);
    error = res.error;
  } else {
    const res = await supaClient.from('concerts').insert(payload);
    error = res.error;
  }

  btn.disabled = false;
  if (error) { showToast('保存エラー: ' + error.message, 'err'); return; }

  closeModal('addModal');
  showToast(editingId ? '✓ 更新しました' : '✓ 登録しました！', 'ok');
  await loadConcerts();
}

  if (!c) return;
  detailId = id;

  const d2 = c.concert_date ? new Date(c.concert_date + 'T00:00:00') : null;
  const dateStr2 = d2 ? `${d2.getFullYear()}年${d2.getMonth()+1}月${d2.getDate()}日（${WEEKDAYS[d2.getDay()]}）` : '—';

  const timeItems = [
    { key: 'open_time', label: '開場' },
    { key: 'start_time', label: '開演' },
    { key: 'merch_time', label: '物販' },
    { key: 'tokuten_time', label: '特典会' },
    { key: 'cd_sale_time', label: 'CD販売' },
  ].filter(t => c[t.key]);

  const timesHtml = timeItems.length ? `<div class="detail-times">${
    timeItems.map(t => `<div class="dtime"><div class="dtime-label">${t.label}</div><div class="dtime-val">${c[t.key].slice(0,5)}</div></div>`).join('')
  }</div>` : '';

  document.getElementById('detailTitle').textContent = c.title;

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">
      <div class="detail-title-block">
        ${c.event_type ? `<div class="detail-type-badge" data-type="${esc(c.event_type)}">${esc(c.event_type)}</div>` : ''}
        <div class="detail-sub">${dateStr2}${c.venue ? ' · ' + esc(c.venue) : ''}${c.city ? '（' + esc(c.city) + '）' : ''}</div>
      </div>
      ${timesHtml}
      <div class="detail-grid">
        <div class="detail-item"><label>アーティスト</label><div class="val">${esc(c.artist||'—')}</div></div>
        <div class="detail-item"><label>宿泊</label><div class="val">${esc(c.stay||'—')}</div></div>
        <div class="detail-item"><label>交通手段</label><div class="val">${(c.transport||[]).join('・')||'—'}</div></div>
        <div class="detail-item"><label>同行者</label><div class="val">${esc(c.companion||'—')}</div></div>
        ${c.ticket_url ? `<div class="detail-item"><label>チケット</label><div class="val"><a href="${esc(c.ticket_url)}" target="_blank">🔗 開く</a></div></div>` : ''}
        ${c.concert_url ? `<div class="detail-item"><label>公演詳細</label><div class="val"><a href="${esc(c.concert_url)}" target="_blank">🔗 公式</a></div></div>` : ''}
        ${c.memo ? `<div class="detail-item" style="grid-column:1/-1"><label>メモ</label><div class="val">${esc(c.memo)}</div></div>` : ''}
      </div>
    </div>`;

  document.getElementById('detailModal').classList.add('open');
}

function editConcert() {
  const c = concerts.find(x => x.id === detailId);
  if (!c) return;
  closeModal('detailModal');
  editingId = detailId;

  clearForm();
  document.getElementById('modalTitle').textContent = '遠征を編集';
  document.getElementById('submitLabel').textContent = '更新する';
  setInputMode('manual');

  document.getElementById('fTitle').value = c.title || '';
  document.getElementById('fArtist').value = c.artist || '';
  document.getElementById('fDate').value = c.concert_date || '';
  document.getElementById('fVenue').value = c.venue || '';
  document.getElementById('fCity').value = c.city || '';
  document.getElementById('fOpenTime').value = c.open_time?.slice(0,5) || '';
  document.getElementById('fStartTime').value = c.start_time?.slice(0,5) || '';
  document.getElementById('fMerchTime').value = c.merch_time?.slice(0,5) || '';
  document.getElementById('fTokutenTime').value = c.tokuten_time?.slice(0,5) || '';
  const cdEl = document.getElementById('fCdSaleTime');
  if (cdEl) cdEl.value = c.cd_sale_time?.slice(0,5) || '';
  const calLabelEl = document.getElementById('fCalLabel');
  if (calLabelEl) calLabelEl.value = c.cal_label || '';
  if (c.event_type) {
    const etEl = document.querySelector('.et-chip[data-type="' + c.event_type + '"]');
    if (etEl) { etEl.classList.add('selected'); etEl.querySelector('input').checked = true; }
  }
  document.getElementById('fStay').value = c.stay || '';
  document.getElementById('fCompanion').value = c.companion || '';
  document.getElementById('fTicketUrl').value = c.ticket_url || '';
  document.getElementById('fConcertUrl').value = c.concert_url || '';
  document.getElementById('fMemo').value = c.memo || '';

  if (c.transport) {
    document.querySelectorAll('.chip').forEach(ch => {
      if (c.transport.includes(ch.querySelector('input').value)) ch.classList.add('on');
    });
  }

  document.getElementById('addModal').classList.add('open');
}

async function deleteConcert() {
  if (!confirm('この遠征を削除しますか？')) return;
  const { error } = await supaClient.from('concerts').delete().eq('id', detailId);
  if (error) { showToast('削除エラー: ' + error.message, 'err'); return; }
  closeModal('detailModal');
  showToast('削除しました', 'ok');
  await loadConcerts();
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function clearForm() {
  document.querySelectorAll('.et-chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('input[name="eventType"]').forEach(r => r.checked = false);
  ['fTitle','fArtist','fDate','fVenue','fCity','fOpenTime','fStartTime',
   'fMerchTime','fTokutenTime','fCdSaleTime','fCalLabel','fCompanion','fTicketUrl','fConcertUrl','fMemo'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  document.getElementById('fStay').value = '';
  document.getElementById('concertUrl').value = '';
  document.getElementById('imgFile').value = '';
  setStatus(false);
}

// ── URL FETCH ─────────────────────────────────────────────
async function callGemini(body, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    let res;
    try {
      res = await fetch(WORKER_PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } catch(netErr) {
      if (i < retries) { await new Promise(r => setTimeout(r, 3000)); continue; }
      throw new Error('ネットワークエラー: ' + netErr.message);
    }
    if (!res.ok) {
      let msg = 'API Error ' + res.status;
      try { const e = await res.json(); msg += ': ' + (e.error || '').slice(0,60); } catch(e2) {}
      throw new Error(msg);
    }
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text;
    const text = typeof raw === 'string' ? raw : (raw ? JSON.stringify(raw) : '');
    if (!text) throw new Error('AIからレスポンスがありませんでした');
    // JSON部分を抽出（```json ... ``` も対応）
    const cleaned = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '');
    const m = cleaned.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('JSON形式で返ってきませんでした: ' + text.slice(0, 60));
    return JSON.parse(m[0]);
  }
  throw new Error('リトライ上限。しばらく待ってから再試行してください');
}

async function fetchFromUrl() {
  const url = document.getElementById('concertUrl').value.trim();
  if (!url) { showToast('URLを入力してください', 'err'); return; }

  document.getElementById('fetchUrlBtn').disabled = true;
  setStatus(true, 'AIがページを解析中...');

  const JSON_SCHEMA = '{"title":"ライブ名","artist":"アーティスト名","concert_date":"YYYY-MM-DD","open_time":"HH:MM","start_time":"HH:MM","merch_time":null,"tokuten_time":null,"cd_sale_time":null,"cd_sale_time":null,"venue":"会場名","city":"都市名","ticket_url":null,"concert_url":"' + url + '"}';
  const prompt = 'このURLのライブ・コンサート公演情報から以下をJSONのみで返してください。説明文不要。情報がない場合はnull。日付はYYYY-MM-DD形式、時間はHH:MM形式（24時間制）。\nURL: ' + url + '\n' + JSON_SCHEMA;

  try {
    // fetch_url をWorkerに渡してサーバー側でページを取得
    const info = await callGemini({
      fetch_url: url,
      contents: [{ parts: [{ text: prompt }] }]
    });
    fillForm(info);
    setStatus(false);
    showToast('✓ 読み取り完了', 'ok');
  } catch(e) {
    setStatus(false);
    showToast('読み取りエラー: ' + e.message, 'err');
  } finally {
    document.getElementById('fetchUrlBtn').disabled = false;
  }
}


async function handleImg(file) {
  setStatus(true, 'AIが画像を解析中...');
  const dz = document.getElementById('dropZone');
  if (dz) dz.querySelector('.drop-text').textContent = '📎 ' + file.name;

  let base64;
  try {
    base64 = await new Promise((res, rej) => {
      const rd = new FileReader();
      rd.onload = e => res(e.target.result.split(',')[1]);
      rd.onerror = () => rej(new Error('画像の読み込みに失敗しました'));
      rd.readAsDataURL(file);
    });
  } catch(readErr) {
    setStatus(false);
    showToast(readErr.message, 'err');
    return;
  }

  const mediaType = file.type || 'image/jpeg';
  const prompt = 'このライブ・コンサートのチケットまたは公演情報の画像から以下をJSONのみで返してください。説明文不要。情報がない場合はnull。日付はYYYY-MM-DD形式、時間はHH:MM形式（24時間制）。\n{"title":"ライブ名","artist":"アーティスト名","concert_date":"YYYY-MM-DD","open_time":"HH:MM","start_time":"HH:MM","merch_time":null,"tokuten_time":null,"cd_sale_time":null,"cd_sale_time":null,"venue":"会場名","city":"都市名","ticket_url":null,"concert_url":null}';

  try {
    const info = await callGemini({
      contents: [{ parts: [
        { inline_data: { mime_type: mediaType, data: base64 } },
        { text: prompt }
      ]}]
    });
    fillForm(info);
    setStatus(false);
    showToast('✓ 読み取り完了', 'ok');
  } catch(e) {
    setStatus(false);
    showToast('読み取りエラー: ' + e.message, 'err');
  }
}

function toggleChip(el) {
  el.classList.toggle('on');
  el.querySelector('input').checked = el.classList.contains('on');
}

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastDot').className = 'toast-dot ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ─────────────────────────────────────────────────
async function init() {
  // file:// 警告
  if (location.protocol === 'file:') {
    document.getElementById('loginErr').textContent =
      '⚠️ ファイルをダブルクリックで開いています。ブラウザのセキュリティ制限でログインできません。GitHub PagesやVercelなどのサーバーから開いてください。';
    return;
  }

  if (!initSupabase(HARDCODED_SUPA_URL, HARDCODED_SUPA_KEY)) {
    showToast('Supabase接続に失敗しました', 'err');
    return;
  }
  // Check existing session
  const { data: { session } } = await supaClient.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    enterApp();
  }
}

init();
