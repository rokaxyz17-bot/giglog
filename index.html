<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExDATE — ライブスケジュール管理</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f4f6fb;
  --bg2: #eef1f8;
  --surface: #ffffff;
  --surface2: #f8f9fd;
  --surface3: #edf0f8;
  --border: #dde2ef;
  --border2: #c8d0e8;
  --accent: #1a5cff;
  --accent2: #4d82ff;
  --accent-dim: rgba(26,92,255,0.09);
  --accent-dark: #0a3dbf;
  --ink: #0f1523;
  --text: #1a2035;
  --text-muted: #6b7694;
  --text-dim: #a8b0c8;
  --green: #12c47a;
  --green-dim: rgba(18,196,122,0.1);
  --red: #f02b5a;
  --red-dim: rgba(240,43,90,0.1);
  --sans: 'Noto Sans JP', sans-serif;
  --mono: 'Space Mono', monospace;
  --cond: 'Big Shoulders Display', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── GRAIN OVERLAY ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ── SETUP SCREEN ── */
#setupScreen {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: var(--bg);
  position: relative;
}

/* diagonal accent strip */
#setupScreen::before {
  content: '';
  position: fixed;
  top: -80px; right: -80px;
  width: 400px; height: 400px;
  background: var(--accent);
  opacity: 0.05;
  border-radius: 50%;
  pointer-events: none;
}

.setup-wrap {
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 1;
}

/* ── SPRAY-ART SVG LOGO ── */
.setup-logo {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
}

.logo-svg-wrap {
  display: inline-block;
  position: relative;
}

.logo-sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-top: 6px;
  opacity: 0.8;
}

/* ── AUTH CARD ── */
.setup-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 32px rgba(26,92,255,0.06), 0 1px 4px rgba(0,0,0,0.04);
}

.setup-tabs {
  display: flex;
  border-bottom: 1.5px solid var(--border);
  background: var(--surface2);
}

.setup-tab {
  flex: 1;
  padding: 14px;
  background: none;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.02em;
}

.setup-tab.active {
  color: var(--accent);
  background: var(--surface);
  box-shadow: inset 0 -2px 0 var(--accent);
}

.setup-tab:hover:not(.active) {
  color: var(--text);
  background: var(--surface3);
}

.setup-body {
  padding: 28px 28px 24px;
}

.setup-note {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 20px;
  padding: 12px 14px;
  background: var(--accent-dim);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
}

.setup-note a {
  color: var(--accent);
  text-decoration: none;
}

.field {
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 7px;
}

.field input, .field select, .field textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}

.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
  background: var(--surface);
}

.err-msg {
  font-size: 12px;
  color: var(--red);
  margin: 8px 0 4px;
  min-height: 16px;
  line-height: 1.5;
}

.btn-primary {
  width: 100%;
  padding: 12px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.16s;
  margin-top: 4px;
  letter-spacing: 0.02em;
}

.btn-primary:hover {
  background: var(--accent-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(26,92,255,0.28);
}

.btn-primary:active {
  transform: translateY(0);
}

/* ── APP SCREEN HEADER ── */
.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 24px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(26,92,255,0.05);
}

.app-logo {
  display: flex;
  align-items: center;
}

.header-center { flex: 1; }

.user-email {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn-settings {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-settings:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-logout {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-logout:hover {
  border-color: var(--red);
  color: var(--red);
}

/* ── SETTINGS PANEL ── */
.settings-panel {
  display: none;
  position: absolute;
  top: 56px; right: 16px;
  width: 300px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

.settings-panel.open { display: block; }

.settings-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* ── APP BODY ── */
.app-body {
  flex: 1;
  padding: 24px;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}

.view-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}

.view-tabs {
  display: flex;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}

.view-tab {
  padding: 7px 18px;
  background: none;
  border: none;
  border-radius: 7px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.view-tab.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(26,92,255,0.25);
}

.view-tab:hover:not(.active) {
  background: var(--surface3);
  color: var(--text);
}

.btn-add {
  padding: 9px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.16s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.btn-add:hover {
  background: var(--accent-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(26,92,255,0.28);
}

/* ── CONCERT LIST ── */
.concert-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.concert-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.concert-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.15s;
}

.concert-card:hover {
  border-color: var(--accent2);
  box-shadow: 0 4px 20px rgba(26,92,255,0.08);
  transform: translateY(-1px);
}

.concert-card:hover::before {
  opacity: 1;
}

.concert-date-block {
  min-width: 52px;
  text-align: center;
  background: var(--accent-dim);
  border-radius: 10px;
  padding: 8px 6px;
  flex-shrink: 0;
}

.concert-date-month {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.concert-date-day {
  font-family: var(--cond);
  font-size: 26px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  margin-top: 1px;
}

.concert-date-weekday {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 2px;
}

.concert-info {
  flex: 1;
  min-width: 0;
}

.concert-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.concert-artist {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 6px;
}

.concert-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.concert-meta-item {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 3px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 64px 20px;
  color: var(--text-dim);
}

.empty-icon {
  font-size: 48px;
  display: block;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state p {
  font-size: 14px;
  color: var(--text-muted);
}

/* ── CALENDAR ── */
#calendarView { display: none; }

.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.calendar-title {
  font-family: var(--cond);
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 0.02em;
}

.btn-cal-nav {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 16px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-cal-nav:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.calendar-grid {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.calendar-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--surface2);
  border-bottom: 1.5px solid var(--border);
}

.cal-weekday {
  text-align: center;
  padding: 10px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.calendar-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

.cal-day {
  min-height: 72px;
  padding: 8px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}

.cal-day:nth-child(7n) { border-right: none; }

.cal-day.other-month .cal-day-num { color: var(--text-dim); }

.cal-day.today .cal-day-num {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 24px; height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

.cal-day-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-weight: 700;
}

.cal-event {
  font-size: 10px;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 4px;
  padding: 2px 5px;
  margin-bottom: 2px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 600;
  border-left: 2px solid var(--accent);
  transition: background 0.12s;
}

.cal-event:hover { background: rgba(26,92,255,0.18); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,15,35,0.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(10,15,35,0.18);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 24px 16px;
  border-bottom: 1.5px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
}

.modal-title {
  font-family: var(--cond);
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.btn-close {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
}

.btn-close:hover {
  border-color: var(--red);
  color: var(--red);
}

.modal-body { padding: 24px; }

/* ── ADD MODAL TABS ── */
.add-method-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}

.add-method-btn {
  flex: 1;
  padding: 12px 8px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}

.add-method-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.add-method-btn:hover:not(.active) {
  border-color: var(--border2);
  color: var(--text);
}

.add-pane { display: none; }
.add-pane.active { display: block; }

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── AI LOADING ── */
.ai-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 32px;
  color: var(--text-muted);
  font-size: 13px;
}

.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── MODAL ACTIONS ── */
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  padding-top: 8px;
  margin-top: 8px;
  border-top: 1.5px solid var(--border);
}

.btn-secondary {
  padding: 10px 20px;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-secondary:hover {
  border-color: var(--border2);
  color: var(--text);
}

.btn-danger {
  padding: 10px 20px;
  background: none;
  border: 1.5px solid var(--red);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--red);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-danger:hover {
  background: var(--red-dim);
}

/* ── DETAIL MODAL ── */
.detail-hero {
  background: linear-gradient(135deg, var(--accent-dim) 0%, var(--surface2) 100%);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1.5px solid var(--border);
}

.detail-title {
  font-family: var(--cond);
  font-size: 26px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}

.detail-artist {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
}

.detail-times {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.detail-time-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.detail-time-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
}

.detail-time-val {
  font-family: var(--cond);
  font-size: 18px;
  font-weight: 900;
  color: var(--text);
}

.detail-section {
  margin-bottom: 16px;
}

.detail-section-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.detail-section-val {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
}

.tag {
  display: inline-block;
  padding: 3px 9px;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  margin-right: 4px;
  margin-bottom: 4px;
}

.detail-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
}

.detail-link:hover { text-decoration: underline; }

.detail-memo {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  padding: 12px 20px;
  background: var(--ink);
  color: #fff;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9000;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.25s;
  max-width: 320px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.ok { background: var(--green); }
.toast.err { background: var(--red); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {

let editingId = null;

const STORAGE_KEY = 'exdate_cfg';
// ── HARDCODED CREDENTIALS (管理者設定済み) ─────────────────
const HARDCODED_SUPA_URL = 'https://hjslduovqhskvvogwdmr.supabase.co';
const HARDCODED_SUPA_KEY = atob('ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW1ocWMyeGtkVzkyY1doemEzWjJiMmQzWkcxeUlpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTnpNME1EY3lPRFlzSW1WNGNDSTZNakE0T0RrNE16STRObjAuaWNKcnJITVhpc0o2cjdVZFRQZ01ZNWdvNUhEQXVleUEyTnAxeE82RFB0bw==');
const _a1 = 'c2stYW50LWFwaTAzLXlnaTQ3ZUdLcVp5MEc0dWpoendFdm5vN19wNlZEZmtINENNV3Rv';
const _a2 = 'dGVYc3ptT0ZMd0JjeVVBMGdaMk5wZG5rQzNVcEdDaWU4UU03WkpFeFBSSi1zZHB3LWtSQklNZ0FB';
const HARDCODED_ANTH_KEY = atob(_a1 + _a2);
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const MONTHS_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// ── CONFIG ───────────────────────────────────────────────
function loadCfg() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveCfgData(data) {
  const existing = loadCfg();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...existing, ...data }));
}

function getAnthKey() {
  return HARDCODED_ANTH_KEY;
}

// ── SUPABASE INIT ─────────────────────────────────────────
function initSupabase(url, key) {
  try {
    supaClient = supabase.createClient(url, key);
    return true;
  } catch(e) {
    return false;
  }
}

// ── SETUP / AUTH ──────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.setup-tab').forEach(t => t.classList.remove('active'));
  const tabs = ['login','signup'];
  const idx = tabs.indexOf(tab);
  if (idx >= 0) document.querySelectorAll('.setup-tab')[idx].classList.add('active');
  document.getElementById('loginPane').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('signupPane').style.display = tab === 'signup' ? '' : 'none';
}

async function saveConfig() {
  const url = document.getElementById('cfgSupaUrl').value.trim();
  const key = document.getElementById('cfgSupaKey').value.trim();
  const anth = document.getElementById('cfgAnthKey').value.trim();
  const err = document.getElementById('configErr');

  if (!url || !key) { err.textContent = 'SupabaseのURLとKeyは必須です'; return; }

  if (!initSupabase(url, key)) {
    err.textContent = '接続に失敗しました。URLとKeyを確認してください';
    return;
  }

  try {
    const { error } = await supaClient.from('concerts').select('id').limit(1);
    if (error && error.code !== 'PGRST116') {
      err.textContent = 'テーブルが見つかりません。SQLを実行してください: ' + error.message;
      return;
    }
    saveCfgData({ supaUrl: url, supaKey: key, anthKey: anth });
    err.style.color = 'var(--green)';
    err.textContent = '✓ 接続成功！ログインしてください';
    setTimeout(() => switchAuthTab('login'), 1500);
  } catch(e) {
    err.textContent = 'エラー: ' + e.message;
  }
}

async function doLogin() {
  if (!ensureSupabase()) return;
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';
  err.style.color = '';

  try {
    const { data, error } = await supaClient.auth.signInWithPassword({ email, password: pass });
    if (error) {
      if (error.message === 'Email not confirmed') {
        err.textContent = 'メールアドレスの確認が完了していません。届いた確認メールのリンクをクリックしてから再度ログインしてください。';
      } else if (error.message === 'Invalid login credentials') {
        err.textContent = 'メールアドレスまたはパスワードが正しくありません。';
      } else {
        err.textContent = error.message;
      }
      return;
    }
    currentUser = data.user;
    enterApp();
  } catch(e) {
    err.textContent = '接続エラーが発生しました。インターネット接続を確認してください。(' + e.message + ')';
  }
}

async function doSignup() {
  if (!ensureSupabase()) return;
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPass').value;
  const err = document.getElementById('signupErr');
  err.textContent = '';
  err.style.color = '';

  if (pass.length < 6) { err.textContent = 'パスワードは6文字以上にしてください'; return; }

  try {
    const { data, error } = await supaClient.auth.signUp({ email, password: pass });
    if (error) { err.textContent = error.message; return; }
    err.style.color = 'var(--green)';
    err.textContent = '✓ 登録完了！確認メールをお送りしました。メール内のリンクをクリックして認証後、ログインしてください。';
  } catch(e) {
    err.textContent = '接続エラーが発生しました。インターネット接続を確認してください。(' + e.message + ')';
  }
}

async function doLogout() {
  await supaClient.auth.signOut();
  currentUser = null;
  concerts = [];
  showScreen('setupScreen');
}

function ensureSupabase() {
  if (!supaClient) initSupabase(HARDCODED_SUPA_URL, HARDCODED_SUPA_KEY);
  return true;
}

// ── APP ───────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function enterApp() {
  showScreen('appScreen');
  document.getElementById('userEmailLabel').textContent = currentUser.email;
  await loadConcerts();
  initCalendar();
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

function saveSettings() {
  // no-op (keys are hardcoded)
}

// ── CONCERT DATA ──────────────────────────────────────────
async function loadConcerts() {
  const { data, error } = await supaClient
    .from('concerts')
    .select('*')
    .order('concert_date', { ascending: true });

  if (error) { showToast('読み込みエラー: ' + error.message, 'err'); return; }
  concerts = data || [];
  renderList();
  renderCalendar();
}

function renderList() {
  const el = document.getElementById('concertList');
  if (!concerts.length) {
    el.innerHTML = `<div class="empty-state">
      <span class="empty-icon">🎤</span>
      <p>まだ遠征が登録されていません<br>「遠征を追加」から登録しましょう</p>
    </div>`;
    return;
  }

  el.innerHTML = concerts.map(c => {
    const d = c.concert_date ? new Date(c.concert_date + 'T00:00:00') : null;
    const monthStr = d ? `${d.getMonth()+1}月` : '—';
    const dayStr = d ? d.getDate() : '—';
    const wdStr = d ? WEEKDAYS[d.getDay()] : '';

    const times = [];
    if (c.open_time) times.push(`<div class="time-chip">🚪 ${c.open_time.slice(0,5)}</div>`);
    if (c.start_time) times.push(`<div class="time-chip">▶ ${c.start_time.slice(0,5)}</div>`);
    if (c.merch_time) times.push(`<div class="time-chip merch">🛍 ${c.merch_time.slice(0,5)}</div>`);
    if (c.tokuten_time) times.push(`<div class="time-chip tokuten">🌟 ${c.tokuten_time.slice(0,5)}</div>`);

    const transport = (c.transport || []).join(' ');

    return `<div class="concert-card" onclick="openDetail('${c.id}')">
      <div class="concert-card-inner">
        <div class="card-date-col">
          <div class="card-month">${monthStr}</div>
          <div class="card-day">${dayStr}</div>
          <div class="card-weekday">${wdStr}</div>
        </div>
        <div class="card-body-col">
          <div class="card-title">${esc(c.title)}</div>
          ${c.artist ? `<div class="card-artist">${esc(c.artist)}</div>` : ''}
          <div class="card-times">${times.join('')}</div>
        </div>
        <div class="card-meta-col">
          <div class="venue-tag">${esc(c.venue||'')}${c.city ? '<br>'+esc(c.city) : ''}</div>
          ${transport ? `<div class="transport-tags">${(c.transport||[]).map(t=>`<span class="transport-tag">${t}</span>`).join('')}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── CALENDAR ─────────────────────────────────────────────
function initCalendar() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  if (!document.getElementById('calGrid')) return;
  document.getElementById('calMonthLabel').textContent = `${calYear}年 ${MONTHS_JP[calMonth]}`;

  const grid = document.getElementById('calGrid');
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();

  // Weekday headers
  let html = WEEKDAYS.map(d => `<div class="cal-weekday">${d}</div>`).join('');

  // Blank cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-cell other-month"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayConcerts = concerts.filter(c => c.concert_date === dateStr);
    const eventsHtml = dayConcerts.map(c =>
      `<div class="cal-event" onclick="event.stopPropagation();openDetail('${c.id}')">${esc(c.title)}</div>`
    ).join('');

    html += `<div class="cal-cell${isToday?' today':''}">
      <span class="cal-day-num">${d}</span>
      ${eventsHtml}
    </div>`;
  }

  // Fill remaining cells
  const total = firstDay + daysInMonth;
  const remainder = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 0; i < remainder; i++) html += `<div class="cal-cell other-month"></div>`;

  grid.innerHTML = html;
}

function switchView(v) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-tab')[v === 'list' ? 0 : 1].classList.add('active');
  document.getElementById('listView').style.display = v === 'list' ? '' : 'none';
  document.getElementById('calendarView').style.display = v === 'calendar' ? '' : 'none';
}

// ── ADD MODAL ────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  clearForm();
  document.getElementById('modalTitle').textContent = '遠征を追加';
  document.getElementById('submitLabel').textContent = '登録する';
  setInputMode('url');
  document.getElementById('addModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function setInputMode(mode) {
  ['url','img','manual'].forEach(m => {
    document.getElementById('step'+cap(m)).classList.toggle('active', m === mode);
    document.getElementById('zone'+cap(m)).classList.toggle('visible', m === mode);
  });
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function clearForm() {
  ['fTitle','fArtist','fDate','fVenue','fCity','fOpenTime','fStartTime',
   'fMerchTime','fTokutenTime','fCompanion','fTicketUrl','fConcertUrl','fMemo'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  document.getElementById('fStay').value = '';
  document.getElementById('concertUrl').value = '';
  document.getElementById('imgFile').value = '';
  setStatus(false);
}

// ── URL FETCH ─────────────────────────────────────────────
async function fetchFromUrl() {
  const url = document.getElementById('concertUrl').value.trim();
  if (!url) { showToast('URLを入力してください', 'err'); return; }
  const anthKey = getAnthKey();
  if (!anthKey) {
    showToast('設定⚙からAnthropicキーを入力してください', 'err');
    toggleSettings();
    return;
  }

  document.getElementById('fetchUrlBtn').disabled = true;
  setStatus(true, 'AIがページを解析中...');

  const prompt = `以下のURLはライブ・コンサートの公演情報またはチケットページです。
アクセスして以下の情報をJSONで抽出してください。情報がない場合はnullにしてください。
時間はHH:MM形式（24時間）で返してください。

URL: ${url}

{
  "title": "公演・ライブ名",
  "artist": "アーティスト名",
  "date": "YYYY-MM-DD",
  "venue": "会場名",
  "city": "都市名",
  "open_time": "開場時間 HH:MM",
  "start_time": "開演時間 HH:MM",
  "merch_time": "物販開始時間 HH:MM",
  "tokuten_time": "特典会・握手会開始時間 HH:MM",
  "ticket_url": "チケット購入URL（このURLと同じまたは別途あれば）",
  "concert_url": "公演詳細の公式URL"
}

JSONのみ返してください。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': anthKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const text = (data.content.find(b => b.type === 'text')?.text) || '';
    const m = text.match(/\{[\s\S]*\}/);
    if (m) fillForm(JSON.parse(m[0]), url);
    setStatus(false);
    showToast('読み取り完了！内容を確認してください', 'ok');
  } catch(e) {
    setStatus(false, null, e.message);
    showToast('読み取りエラー: ' + e.message, 'err');
  } finally {
    document.getElementById('fetchUrlBtn').disabled = false;
  }
}

// ── IMAGE FETCH ───────────────────────────────────────────
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f?.type.startsWith('image/')) handleImg(f);
});

async function handleImg(file) {
  const anthKey = getAnthKey();
  if (!anthKey) {
    showToast('設定⚙からAnthropicキーを入力してください', 'err');
    toggleSettings();
    return;
  }

  setStatus(true, 'AIが画像を解析中...');
  dz.querySelector('.drop-text').textContent = `📎 ${file.name}`;

  const base64 = await new Promise(r => {
    const rd = new FileReader();
    rd.onload = e => r(e.target.result.split(',')[1]);
    rd.readAsDataURL(file);
  });

  const mediaType = file.type || 'image/jpeg';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': anthKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: `このライブ・コンサートのチケットまたは公演情報の画像から以下をJSONで抽出してください。
情報がない場合はnull。時間はHH:MM形式（24時間制）。

{
  "title": "公演・ライブ名",
  "artist": "アーティスト名",
  "date": "YYYY-MM-DD",
  "venue": "会場名",
  "city": "都市名",
  "open_time": "開場 HH:MM",
  "start_time": "開演 HH:MM",
  "merch_time": "物販開始 HH:MM",
  "tokuten_time": "特典会・握手会 HH:MM"
}

JSONのみ返してください。` }
          ]
        }]
      })
    });

    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const text = data.content.find(b => b.type === 'text')?.text || '';
    const m = text.match(/\{[\s\S]*\}/);
    if (m) fillForm(JSON.parse(m[0]));
    setStatus(false);
    showToast('読み取り完了！', 'ok');
  } catch(e) {
    setStatus(false, null, e.message);
    showToast('エラー: ' + e.message, 'err');
  }
}

function fillForm(d, sourceUrl) {
  if (d.title) document.getElementById('fTitle').value = d.title;
  if (d.artist) document.getElementById('fArtist').value = d.artist;
  if (d.date) document.getElementById('fDate').value = d.date;
  if (d.venue) document.getElementById('fVenue').value = d.venue;
  if (d.city) document.getElementById('fCity').value = d.city;
  if (d.open_time) document.getElementById('fOpenTime').value = d.open_time;
  if (d.start_time) document.getElementById('fStartTime').value = d.start_time;
  if (d.merch_time) document.getElementById('fMerchTime').value = d.merch_time;
  if (d.tokuten_time) document.getElementById('fTokutenTime').value = d.tokuten_time;
  if (d.ticket_url) document.getElementById('fTicketUrl').value = d.ticket_url;
  if (d.concert_url) document.getElementById('fConcertUrl').value = d.concert_url;
  else if (sourceUrl) document.getElementById('fConcertUrl').value = sourceUrl;
}

// ── SUBMIT ────────────────────────────────────────────────
async function submitConcert() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('ライブ名を入力してください', 'err'); return; }

  const transport = [...document.querySelectorAll('.chip.on input')].map(i => i.value);

  const payload = {
    user_id: currentUser.id,
    title,
    artist: document.getElementById('fArtist').value || null,
    concert_date: document.getElementById('fDate').value || null,
    open_time: document.getElementById('fOpenTime').value || null,
    start_time: document.getElementById('fStartTime').value || null,
    merch_time: document.getElementById('fMerchTime').value || null,
    tokuten_time: document.getElementById('fTokutenTime').value || null,
    venue: document.getElementById('fVenue').value || null,
    city: document.getElementById('fCity').value || null,
    transport: transport.length ? transport : null,
    stay: document.getElementById('fStay').value || null,
    companion: document.getElementById('fCompanion').value || null,
    ticket_url: document.getElementById('fTicketUrl').value || null,
    concert_url: document.getElementById('fConcertUrl').value || null,
    memo: document.getElementById('fMemo').value || null,
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  let error;
  if (editingId) {
    const res = await supaClient.from('concerts').update(payload).eq('id', editingId);
    error = res.error;
  } else {
    const res = await supaClient.from('concerts').insert(payload);
    error = res.error;
  }

  btn.disabled = false;
  if (error) { showToast('保存エラー: ' + error.message, 'err'); return; }

  closeModal('addModal');
  showToast(editingId ? '✓ 更新しました' : '✓ 登録しました！', 'ok');
  await loadConcerts();
}

// ── DETAIL ────────────────────────────────────────────────
function openDetail(id) {
  const c = concerts.find(x => x.id === id);
  if (!c) return;
  detailId = id;

  document.getElementById('detailTitle').textContent = c.title;

  const timeItems = [
    { key: 'open_time', label: '開場', cls: '' },
    { key: 'start_time', label: '開演', cls: '' },
    { key: 'merch_time', label: '物販', cls: 'merch' },
    { key: 'tokuten_time', label: '特典会', cls: 'tokuten' },
  ].filter(t => c[t.key]);

  const timesHtml = timeItems.length ? `
    <div class="detail-times">
      ${timeItems.map(t => `
        <div class="dtime ${t.cls}">
          <div class="dtime-label">${t.label}</div>
          <div class="dtime-val">${c[t.key].slice(0,5)}</div>
        </div>
      `).join('')}
    </div>` : '';

  const d = c.concert_date ? new Date(c.concert_date + 'T00:00:00') : null;
  const dateStr = d ? `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）` : '—';

  document.getElementById('detailBody').innerHTML = `
    ${timesHtml}
    <div class="detail-grid">
      <div class="detail-item"><label>公演日</label><div class="val">${dateStr}</div></div>
      <div class="detail-item"><label>アーティスト</label><div class="val">${esc(c.artist||'—')}</div></div>
      <div class="detail-item"><label>会場</label><div class="val">${esc(c.venue||'—')}</div></div>
      <div class="detail-item"><label>都市</label><div class="val">${esc(c.city||'—')}</div></div>
      <div class="detail-item"><label>交通手段</label><div class="val">${(c.transport||[]).join('・')||'—'}</div></div>
      <div class="detail-item"><label>宿泊</label><div class="val">${esc(c.stay||'—')}</div></div>
      <div class="detail-item"><label>同行者</label><div class="val">${esc(c.companion||'—')}</div></div>
      ${c.ticket_url ? `<div class="detail-item"><label>チケットURL</label><div class="val"><a href="${esc(c.ticket_url)}" target="_blank">🔗 開く</a></div></div>` : ''}
      ${c.concert_url ? `<div class="detail-item"><label>公演詳細URL</label><div class="val"><a href="${esc(c.concert_url)}" target="_blank">🔗 公式ページ</a></div></div>` : ''}
      ${c.memo ? `<div class="detail-item" style="grid-column:1/-1"><label>メモ</label><div class="val">${esc(c.memo)}</div></div>` : ''}
    </div>`;

  document.getElementById('detailModal').classList.add('open');
}

function editConcert() {
  const c = concerts.find(x => x.id === detailId);
  if (!c) return;
  closeModal('detailModal');
  editingId = detailId;

  clearForm();
  document.getElementById('modalTitle').textContent = '遠征を編集';
  document.getElementById('submitLabel').textContent = '更新する';
  setInputMode('manual');

  document.getElementById('fTitle').value = c.title || '';
  document.getElementById('fArtist').value = c.artist || '';
  document.getElementById('fDate').value = c.concert_date || '';
  document.getElementById('fVenue').value = c.venue || '';
  document.getElementById('fCity').value = c.city || '';
  document.getElementById('fOpenTime').value = c.open_time?.slice(0,5) || '';
  document.getElementById('fStartTime').value = c.start_time?.slice(0,5) || '';
  document.getElementById('fMerchTime').value = c.merch_time?.slice(0,5) || '';
  document.getElementById('fTokutenTime').value = c.tokuten_time?.slice(0,5) || '';
  document.getElementById('fStay').value = c.stay || '';
  document.getElementById('fCompanion').value = c.companion || '';
  document.getElementById('fTicketUrl').value = c.ticket_url || '';
  document.getElementById('fConcertUrl').value = c.concert_url || '';
  document.getElementById('fMemo').value = c.memo || '';

  if (c.transport) {
    document.querySelectorAll('.chip').forEach(ch => {
      if (c.transport.includes(ch.querySelector('input').value)) ch.classList.add('on');
    });
  }

  document.getElementById('addModal').classList.add('open');
}

async function deleteConcert() {
  if (!confirm('この遠征を削除しますか？')) return;
  const { error } = await supaClient.from('concerts').delete().eq('id', detailId);
  if (error) { showToast('削除エラー: ' + error.message, 'err'); return; }
  closeModal('detailModal');
  showToast('削除しました', 'ok');
  await loadConcerts();
}

// ── UI HELPERS ────────────────────────────────────────────
function setStatus(loading, msg, errMsg) {
  const bar = document.getElementById('statusBar');
  const sp = document.getElementById('spinner');
  const txt = document.getElementById('statusText');
  if (loading) {
    bar.classList.add('visible');
    sp.style.display = '';
    txt.textContent = msg || '処理中...';
    txt.className = '';
  } else if (errMsg) {
    bar.classList.add('visible');
    sp.style.display = 'none';
    txt.textContent = '⚠ ' + errMsg;
    txt.className = 'status-err';
  } else {
    bar.classList.remove('visible');
  }
}

function toggleChip(el) {
  el.classList.toggle('on');
  el.querySelector('input').checked = el.classList.contains('on');
}

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastDot').className = 'toast-dot ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copySQL() {
  // no-op (SQL setup removed)
}

// ── INIT ─────────────────────────────────────────────────
async function init() {
  // file:// 警告
  if (location.protocol === 'file:') {
    document.getElementById('loginErr').textContent =
      '⚠️ ファイルをダブルクリックで開いています。ブラウザのセキュリティ制限でログインできません。GitHub PagesやVercelなどのサーバーから開いてください。';
    return;
  }

  if (!initSupabase(HARDCODED_SUPA_URL, HARDCODED_SUPA_KEY)) {
    showToast('Supabase接続に失敗しました', 'err');
    return;
  }
  // Check existing session
  const { data: { session } } = await supaClient.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    enterApp();
  }
}

init();
